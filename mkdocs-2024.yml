site_name: Prancing Pony Pub
docs_dir: docs/mesbg2024
theme:
  name: material
  palette:
    scheme: mesbg
  custom_dir: overrides
  logo: assets/PPPub_Logo.webp
  favicon: assets/PPPub_Favicon.ico
  font:
    text: PT Serif
  features:
    - header.autohide
    - navigation.indexes
    - navigation.tabs
    - navigation.top
extra:
  generator: false
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.tilde
  - pymdownx.snippets:
      base_path: includes/mesbg2024
      auto_append:
        - tooltip_special_rules.md
        - tooltip_magical_powers.md
        - tooltip_heroic_actions.md
        - tooltip_weapons_and_wargear.md
