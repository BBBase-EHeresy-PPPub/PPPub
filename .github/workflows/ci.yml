name: ci

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Prepare gh-pages
        run: |
          git fetch origin gh-pages || true
          git worktree add gh-pages gh-pages || git worktree add gh-pages origin/gh-pages

      - name: Configure Git Credentials
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install dependencies
        run: pip install mkdocs-material mike

      - name: Build versions
        run: |
          mike delete --all --config-file mkdocs-2024.yml --branch gh-pages --ignore-remote-status
          mike deploy --config-file mkdocs-2018.yml mesbg2018
          mike deploy --config-file mkdocs-2024.yml mesbg2024
          mike set-default --config-file mkdocs-2024.yml mesbg2024
          git -C gh-pages reset --hard gh-pages
          sh .github/pages-root-files.sh docs/mesbg2018 gh-pages
          git -C gh-pages add -A
          git -C gh-pages diff --cached --quiet || git -C gh-pages commit -m "Sync GitHub Pages root files"

      - name: Push gh-pages
        run: git -C gh-pages push origin gh-pages
